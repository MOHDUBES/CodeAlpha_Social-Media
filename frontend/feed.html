<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed - Loopline</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .stories-container {
      display: flex;
      gap: var(--space-4);
      padding: var(--space-4);
      overflow-x: auto;
      scrollbar-width: none; /* Firefox */
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      margin-bottom: var(--space-6);
    }
    .stories-container::-webkit-scrollbar {
      display: none;
    }
    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      cursor: pointer;
      min-width: 72px;
    }
    .story-username {
      font-size: 11px;
      color: var(--text-primary);
      text-align: center;
      max-width: 72px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .story-add {
      position: relative;
    }
    .story-add .avatar {
      border: 2px solid transparent;
    }
    .story-add-btn {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border: 2px solid var(--bg-surface);
      z-index: 2;
    }
  </style>
<link rel="icon" href="/favicon_v2.svg" type="image/svg+xml">
</head>
<body class="page-enter">

  <div class="app-container">
    <!-- Sidebar injected via nav.js -->
    
    <main class="main-content">
      <div class="content-wrapper">
        
        <!-- Stories Bar -->
        <div class="stories-container stagger-1" id="storiesContainer">
          <!-- Add Story -->
          <div class="story-item" id="addStoryBtn" onclick="document.getElementById('storyInput').click()">
            <div class="story-add">
              <img id="currUserStoryAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=fallback" class="avatar avatar--lg" alt="Your Story">
              <div class="story-add-btn"><i class="fas fa-plus"></i></div>
            </div>
            <span class="story-username">Your story</span>
          </div>
          <input type="file" id="storyInput" accept="image/*,video/*" style="display: none;" onchange="uploadStory(event)">
          
          <!-- Fetched Stories will be injected here -->
        </div>


        <!-- Feed List -->
        <div id="feedList">
          <!-- Skeletons load immediately -->
          <div class="card post-card skeleton stagger-3" style="margin-bottom: var(--space-6);">
            <div style="display: flex; gap: 12px;"><div class="skeleton-avatar"></div><div style="flex:1"><div class="skeleton-text"></div><div class="skeleton-text" style="width: 30%;"></div></div></div>
            <div class="skeleton-text" style="margin-top: 16px;"></div><div class="skeleton-text"></div>
          </div>
          <div class="card post-card skeleton stagger-4" style="margin-bottom: var(--space-6);">
            <div style="display: flex; gap: 12px;"><div class="skeleton-avatar"></div><div style="flex:1"><div class="skeleton-text"></div><div class="skeleton-text" style="width: 30%;"></div></div></div>
            <div class="skeleton-text" style="margin-top: 16px;"></div><div class="skeleton-text"></div>
          </div>
        </div>

        <!-- Load More -->
        <div style="text-align: center; margin-top: var(--space-4);">
          <button id="loadMoreBtn" class="btn btn-secondary" style="display: none; margin: 0 auto;">Load More</button>
        </div>

      </div>
    </main>

    <!-- Bottom Bar injected via nav.js -->
  </div>

  <!-- Fullscreen Story Viewer Modal -->
  <div id="storyViewer" class="modal-overlay" style="background: rgba(0,0,0,0.9); backdrop-filter: none;">
    <div style="position: relative; width: 100%; max-width: 400px; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
      <button onclick="closeStoryViewer()" style="position: absolute; top: var(--space-4); right: var(--space-4); background: none; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 10;"><i class="fas fa-times"></i></button>
      
      <div id="storyViewerContent" style="width: 100%; height: 80vh; background: #000; border-radius: var(--radius-lg); overflow: hidden; position: relative;">
        <!-- Story content injected here -->
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/api.js?v=6"></script>
  <script src="js/nav.js?v=6"></script>
  <script src="js/stories.js?v=6"></script>
  <script src="js/feed.js?v=6"></script>
</body>
</html>
