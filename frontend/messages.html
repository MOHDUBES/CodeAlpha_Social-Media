<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Messages - Loopline</title>
  <link rel="icon" href="/favicon_v2.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <!-- Socket.IO Client -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    .messages-layout {
      display: flex;
      height: 100%;
      background: var(--bg-base);
      overflow: hidden;
    }
    .conversations-sidebar {
      width: 350px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
    }
    .conversations-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 20px;
    }
    .conversations-list {
      flex: 1;
      overflow-y: auto;
    }
    .conversation-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .conversation-item:hover, .conversation-item.active {
      background: var(--bg-hover);
    }
    .conversation-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    .conversation-details {
      flex: 1;
      overflow: hidden;
    }
    .conversation-name {
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .conversation-last-msg {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .unread-dot {
      width: 10px;
      height: 10px;
      background: #4a90e2;
      border-radius: 50%;
    }
    .active-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      background: #4cd964;
      border: 2px solid var(--bg-surface);
      border-radius: 50%;
    }
    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }
    
    .notes-section {
      padding: 15px 20px;
      display: flex;
      gap: 15px;
      overflow-x: auto;
      scrollbar-width: none; /* Firefox */
      border-bottom: 1px solid var(--border);
    }
    .notes-section::-webkit-scrollbar {
      display: none; /* Safari and Chrome */
    }
    .note-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      position: relative;
      cursor: pointer;
      min-width: 65px;
    }
    .note-avatar {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      object-fit: cover;
    }
    .note-bubble {
      position: absolute;
      top: -15px;
      background: var(--bg-hover);
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      border: 2px solid var(--bg-surface);
    }
    .note-bubble-new {
      position: absolute;
      top: -10px;
      background: #4a90e2;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: bold;
      color: white;
      border: 2px solid var(--bg-surface);
    }
    .note-name {
      font-size: 12px;
      color: var(--text-primary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }
    
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
    }
    .chat-header {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--bg-surface);
    }
    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .chat-header-name {
      font-weight: 600;
      font-size: 16px;
    }
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message-bubble {
      max-width: 70%;
      padding: 10px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }
    .message-sent {
      align-self: flex-end;
      background: var(--accent-grad);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message-received {
      align-self: flex-start;
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .chat-input-area {
      padding: 15px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
      display: flex;
      gap: 10px;
    }
    .chat-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 20px;
      color: var(--text-primary);
      outline: none;
    }
    .chat-send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform 0.2s;
    }
    .chat-send-btn:hover {
      transform: scale(1.1);
    }
    
    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }
    .empty-chat i {
      font-size: 48px;
      margin-bottom: 15px;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @media (max-width: 768px) {
      .conversations-sidebar {
        width: 100%;
      }
      .chat-area {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        transform: translateX(100%);
        transition: transform 0.3s ease;
      }
      .chat-area.active {
        transform: translateX(0);
      }
      .back-btn {
        display: block !important;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 20px;
        cursor: pointer;
        padding-right: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content" style="padding: 0; height: 100vh; display: flex; flex-direction: column;">
      <!-- Navigation will be injected here by nav.js -->
      
      <!-- In Mobile, the header is injected. We need to offset the layout -->
      <div class="messages-layout" id="messagesLayout" style="margin-top: 60px; height: calc(100vh - 120px);">
        
        <!-- Conversations List -->
        <div class="conversations-sidebar">
          
          <!-- Top Header -->
          <div class="conversations-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
            <div style="display: flex; align-items: center; gap: 8px; font-size: 22px; cursor: pointer;">
              <span id="currentUserHeaderUsername">username</span>
              <i class="fas fa-chevron-down" style="font-size: 14px;"></i>
            </div>
            <i class="far fa-edit" style="font-size: 22px; cursor: pointer;"></i>
          </div>

          <!-- Search Bar -->
          <div style="padding: 10px 20px;">
            <div style="background: var(--bg-hover); border-radius: 24px; padding: 12px 15px; display: flex; align-items: center; gap: 10px; color: var(--text-secondary);">
              <i class="fas fa-search" style="font-size: 16px;"></i>
              <input type="text" placeholder="Search or ask Meta AI" style="background: transparent; border: none; color: var(--text-primary); width: 100%; outline: none; font-size: 16px;">
            </div>
          </div>

          <!-- Notes Section -->
          <div class="notes-section" id="notesSection">
            <div class="note-item" onclick="showToast('Notes feature coming soon!', 'info')">
              <div class="avatar-wrapper">
                <img src="" id="myNoteAvatar" class="note-avatar" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=me'">
              </div>
              <span class="note-name" style="color: var(--text-secondary);">Your note</span>
            </div>
            <!-- Dynamic following will be injected here -->
          </div>

          <!-- Messages Header -->
          <div style="padding: 15px 20px 5px 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 16px; font-weight: 600;">Messages <i class="fas fa-bell-slash" style="font-size: 12px; margin-left: 5px; color: var(--text-secondary);"></i></div>
            <div style="color: #4a90e2; font-weight: 600; font-size: 14px; cursor: pointer;">Requests (1)</div>
          </div>

          <!-- List -->
          <div class="conversations-list" id="conversationsList">
            <!-- Loading skeleton -->
            <div style="padding: 20px; text-align: center; color: var(--text-secondary);">
              Loading...
            </div>
          </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
          <div class="empty-chat" id="emptyChat">
            <i class="far fa-paper-plane"></i>
            <h3>Your Messages</h3>
            <p>Select a conversation to start chatting.</p>
          </div>
          
          <div id="activeChat" style="display: none; height: 100%; flex-direction: column;">
            <div class="chat-header">
              <button class="back-btn" id="backToConversations" style="display: none;">
                <i class="fas fa-arrow-left"></i>
              </button>
              <img src="" alt="" class="chat-header-avatar" id="chatAvatar">
              <div class="chat-header-name" id="chatName">User Name</div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
              <!-- Messages inject here -->
            </div>
            
            <form class="chat-input-area" id="chatForm">
              <input type="text" class="chat-input" id="messageInput" placeholder="Message..." autocomplete="off">
              <button type="submit" class="chat-send-btn">
                <i class="fas fa-paper-plane"></i>
              </button>
            </form>
          </div>
        </div>

      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script src="js/api.js?v=6"></script>
  <script src="js/nav.js?v=6"></script>
  <script src="js/messages.js?v=6"></script>
</body>
</html>
