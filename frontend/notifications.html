<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - Loopline</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="icon" href="/favicon_v2.svg" type="image/svg+xml">
</head>
<body class="page-enter">

  <div class="app-container">
    
    <main class="main-content">
      <div class="content-wrapper">
        
        <div class="stagger-1" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
          <h2>Notifications</h2>
          <button class="btn btn-ghost btn-sm" onclick="markAllRead()" id="markReadBtn" style="display: none;">Mark all read</button>
        </div>

        <div class="card stagger-2" style="padding: 0; overflow: hidden;" id="notificationsList">
          <div style="padding: var(--space-5); text-align: center;">
            <div class="skeleton-avatar" style="margin: 0 auto; margin-bottom: var(--space-3);"></div>
            <div class="skeleton-text" style="width: 50%; margin: 0 auto;"></div>
          </div>
        </div>

      </div>
    </main>
    
  </div>

  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/notifications.js"></script>
</body>
</html>
